name: EDSM Star Type Scanner

on:
  push:
    branches: [ "main" ]
    paths:
      - 'FirstDiscovered.txt'
      - 'FirstDiscoveredTypes.csv'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.2
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12.10'

      - name: Run EDSM scanner
        run: python edsm_scan.py

      - name: Commit updated CSV (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add FirstDiscoveredTypes.csv
          git diff --cached --quiet && echo "No changes to commit." || git commit -m "Update FirstDiscoveredTypes.csv [skip ci]"
          git push
