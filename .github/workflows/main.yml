name: EDSM Star Type Scanner

on:
  push:
    paths:
      - 'FirstDiscovered.txt' 
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.14.5'

      - name: Run EDSM scanner
        run: python edsm_scan.py --input FirstDiscovered.txt --output edsm_results.csv --delay 0.25

      - name: Commit updated CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add edsm_results.csv
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: update edsm_results.csv [skip ci]"
          git push
